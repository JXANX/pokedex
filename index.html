<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon PC Box - Equipos de Batalla</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <p id="titulo-app">⚔ POKÉMON BATTLE TEAMS ⚔</p>

    <!-- ══ PANTALLA DE AUTH ══ -->
    <div id="pantalla-auth">
      <div id="auth-tabs">
        <button
          id="tab-login"
          class="tab-btn activo"
          onclick="mostrarTab('login')"
        >
          INICIAR SESIÓN
        </button>
        <button
          id="tab-registro"
          class="tab-btn"
          onclick="mostrarTab('registro')"
        >
          REGISTRARSE
        </button>
      </div>

      <div id="form-login" class="auth-form">
        <p class="auth-titulo">👤 LOGIN</p>
        <input
          id="login-user"
          type="text"
          placeholder="Usuario"
          maxlength="50"
        />
        <input
          id="login-pass"
          type="password"
          placeholder="Contraseña"
          maxlength="100"
        />
        <button class="btn-auth" onclick="hacerLogin()">► ENTRAR</button>
        <p id="login-error" class="auth-error"></p>
      </div>

      <div id="form-registro" class="auth-form" style="display: none">
        <p class="auth-titulo">✦ NUEVO ENTRENADOR</p>
        <input
          id="reg-user"
          type="text"
          placeholder="Elige un usuario"
          maxlength="50"
        />
        <input
          id="reg-pass"
          type="password"
          placeholder="Contraseña"
          maxlength="100"
        />
        <button class="btn-auth" onclick="hacerRegistro()">
          ► REGISTRARSE
        </button>
        <p id="reg-error" class="auth-error"></p>
      </div>
    </div>

    <!-- ══ APP PRINCIPAL ══ -->
    <div id="app-principal" style="display: none">
      <div id="barra-usuario">
        <span id="nombre-usuario-barra">👤 ---</span>
        <button id="btn-logout" onclick="cerrarSesion()">SALIR ✕</button>
      </div>

      <div id="pc-container">
        <div id="panel-info">
          <div id="panel-info-titulo">PKMN DATA</div>
          <div id="pantalla-pokemon">
            <img id="pokemon-imagen" src="" alt="Pokémon" />
            <p id="mensaje-inicial">Selecciona un<br />Pokémon</p>
          </div>
          <div id="datos-pokemon">
            <p id="pokemon-nombre">---</p>
            <p id="pokemon-numero">Nº ---</p>
            <div id="pokemon-tipos"></div>
            <p id="pokemon-altura">Altura: ---</p>
            <p id="pokemon-peso">Peso: ---</p>
            <p id="pokemon-stats">Stats: ---</p>
            <button id="btn-agregar-equipo" onclick="agregarAlEquipo()">
              + AGREGAR AL EQUIPO
            </button>
          </div>
        </div>

        <div id="panel-caja">
          <div id="barra-superior">
            <button id="btn-anterior" onclick="cambiarCaja(-1)">&#9664;</button>
            <div id="nombre-caja">BOX 1</div>
            <button id="btn-siguiente" onclick="cambiarCaja(1)">&#9654;</button>
          </div>
          <div id="grilla-pokemon"></div>
          <div id="barra-inferior">
            <p id="texto-carga">Cargando...</p>
            <p id="texto-total"></p>
          </div>
        </div>
      </div>

      <div id="panel-equipos">
        <div id="constructor-equipo">
          <div class="panel-titulo">⚔ ARMAR EQUIPO</div>
          <div id="slots-equipo"></div>
          <input
            id="campo-nombre-equipo"
            type="text"
            placeholder="Nombre del equipo..."
            maxlength="50"
          />
          <button id="btn-guardar-equipo" onclick="guardarEquipo()">
            💾 GUARDAR EQUIPO
          </button>
          <button id="btn-limpiar-equipo" onclick="limpiarEquipo()">
            🗑 LIMPIAR
          </button>
          <p id="mensaje-equipo"></p>
        </div>

        <div id="lista-equipos">
          <div id="lista-titulo">📋 MIS EQUIPOS</div>
          <div id="contenedor-equipos">
            <div id="sin-equipos">
              No hay equipos guardados.<br />¡Arma tu primer equipo!
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
